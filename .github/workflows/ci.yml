name: CI

on:
  push:
    branches:
      - main
  pull_request: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Deno Setup
        uses: denoland/setup-deno@v1
        with:
          deno-version: "1.28.1"

      - name: Build
        run: |
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git -b pages bin
          sudo chown -R $USER:$USER ./bin
          deno task build:ci
      - name: Publish
        run: |
          git log -1 --pretty=%B > commit.msg
          cd bin
          git config --global user.name "$GITHUB_ACTOR"
          git config --global user.email "${GITHUB_ACTOR}@bots.github.com"
          git add -A && git commit -F "../commit.msg" || true
          git push || true
